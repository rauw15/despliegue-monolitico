name: CI/CD Pipeline

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job de pruebas
  test:
    name: Ejecutar Pruebas
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Instalar dependencias
      run: npm ci

    - name: Ejecutar linter
      run: npm run lint || echo "Linter no configurado, continuando..."

    - name: Ejecutar pruebas
      run: npm test
      env:
        NODE_ENV: test
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
        JWT_SECRET: test-secret-key

  # Job de construcción de imagen Docker
  build:
    name: Construir Imagen Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login a Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extraer metadatos
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Construir y push imagen
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Job de despliegue a EC2
  deploy:
    name: Desplegar a EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar SSH
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

    - name: Desplegar a EC2
      run: |
        echo "🚀 Iniciando despliegue a EC2..."
        
        # Crear directorio temporal para el despliegue
        ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} '
          mkdir -p ~/despliegue-monolitico
          cd ~/despliegue-monolitico
          
          # Descargar archivos de configuración
          curl -o docker-compose.prod.yml https://raw.githubusercontent.com/${{ github.repository }}/develop/docker-compose.prod.yml
          curl -o deploy.sh https://raw.githubusercontent.com/${{ github.repository }}/develop/scripts/deploy.sh
          
          # Hacer ejecutable el script
          chmod +x deploy.sh
          
          # Configurar variables de entorno
          export DOCKER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop
          export POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          export JWT_SECRET=${{ secrets.JWT_SECRET }}
          
          # Ejecutar despliegue
          ./deploy.sh
        '

    - name: Verificar despliegue
      run: |
        echo "🔍 Verificando despliegue..."
        sleep 30  # Esperar a que la aplicación se inicie
        
        # Verificar que la aplicación responde
        curl -f http://${{ secrets.EC2_HOST }}/api/health || {
          echo "❌ La aplicación no responde correctamente"
          exit 1
        }
        
        echo "✅ Despliegue verificado exitosamente"

  # Job de notificación
  notify:
    name: Notificar Resultado
    runs-on: ubuntu-latest
    needs: [test, build, deploy]
    if: always()
    
    steps:
    - name: Notificar éxito
      if: needs.deploy.result == 'success'
      run: |
        echo "✅ Despliegue completado exitosamente"
        # Aquí puedes agregar notificaciones a Slack, Discord, etc.
        
    - name: Notificar fallo
      if: needs.deploy.result == 'failure'
      run: |
        echo "❌ El despliegue falló"
        # Aquí puedes agregar notificaciones de error
