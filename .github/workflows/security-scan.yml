name: Security Scan

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop ]
  schedule:
    - cron: '0 2 * * 1'  # Ejecutar cada lunes a las 2 AM

jobs:
  # Escaneo de vulnerabilidades en dependencias
  dependency-scan:
    name: Escaneo de Dependencias
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Instalar dependencias
      run: npm ci

    - name: Ejecutar npm audit
      run: npm audit --audit-level=moderate

    # - name: Ejecutar Snyk para detectar vulnerabilidades
    #   uses: snyk/actions/node@master
    #   env:
    #     SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    #   with:
    #     args: --severity-threshold=high
    - name: Skipping Snyk scan (no token configured)
      run: echo "Snyk scan skipped - no token configured"

  # Escaneo de seguridad de imagen Docker
  docker-scan:
    name: Escaneo de Imagen Docker
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Construir imagen Docker
      run: docker build -t despliegue-monolitico:security-scan .

    - name: Ejecutar Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'despliegue-monolitico:security-scan'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Subir resultados de Trivy a GitHub Security
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # Análisis de código con CodeQL
  codeql:
    name: Análisis de Código (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Inicializar CodeQL
      uses: github/codeql-action/init@v2
      with:
        languages: ${{ matrix.language }}

    - name: Autobuild
      uses: github/codeql-action/autobuild@v2

    - name: Realizar análisis CodeQL
      uses: github/codeql-action/analyze@v2
